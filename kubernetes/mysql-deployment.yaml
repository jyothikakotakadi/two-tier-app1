
apiVersion: apps/v1
kind: Deployment

metadata:
  name: mysql

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      containers:
      - name: mysql
        image: mysql:8.0

        env:
        - name: MYSQL_ROOT_PASSWORD
          value: root123

        ports:
        - containerPort: 3306

        volumeMounts:
        - name: mysql-initdb
          mountPath: /docker-entrypoint-initdb.d

      volumes:
      - name: mysql-initdb
        configMap:
          name: mysql-initdb
